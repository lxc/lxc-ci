targets:
  lxc:
    create_message: |
      You just created an {{ image.distribution }} container.
    config:
    - type: all
      content: |-
        lxc.include = LXC_TEMPLATE_CONFIG/common.conf

    - type: user
      content: |-
        lxc.include = LXC_TEMPLATE_CONFIG/userns.conf

    - type: all
      content: |-
        lxc.arch = {{ image.architecture_kernel }}

files:
- path: /etc/hostname
  generator: hostname

- path: /etc/hosts
  generator: hosts

- generator: incus-agent
  types:
    - vm

- path: /etc/config/network
  generator: dump
  content: |-
    config interface 'loopback'
        option ifname 'lo'
        option proto 'static'
        option ipaddr '127.0.0.1'
        option netmask '255.0.0.0'

    config interface 'wan'
        option ifname 'eth0'
        option proto 'dhcp'

    config interface 'wan6'
        option ifname 'eth0'
        option proto 'dhcpv6'

    config globals 'globals'
        option ula_prefix 'auto'

packages:
  manager: apk
  update: false
  cleanup: true
  sets:
  - packages:
    - kmod-9pvirtio
    - kmod-fs-9p
    - kmod-vsock-virtio
    - virtio-console-helper
    action: install
    types:
      - vm

actions:
- trigger: post-unpack
  action: |
    #!/bin/sh
    echo "console::askfirst:/usr/libexec/login.sh" >> /etc/inittab
  types:
    - container

- trigger: post-files
  action: |
    #!/bin/sh
    # we don't need grub in a container
    rm -rf /boot/efi
  types:
    - container

- trigger: post-files
  action: |
    #!/bin/sh
    target=/boot/efi/boot/grub/grub.cfg
    sed -i "s#root=[^ ]*#root=${DISTROBUILDER_ROOT_PARTUUID}#g" "${target}"
  types:
    - vm
  architectures:
    - x86_64

- trigger: post-files
  action: |
    #!/bin/sh
    target=/boot/efi/efi/openwrt/grub.cfg
    sed -i "s#root=[^ ]*#root=${DISTROBUILDER_ROOT_PARTUUID}#g" "${target}"
  types:
    - vm
  architectures:
    - aarch64

- trigger: post-files
  action: |
    #!/bin/sh

    # Disable process isolation to make dnsmasq work
    sed -i 's/procd_add_jail/: \0/g' /etc/init.d/dnsmasq
    # Disable conflicting sysntpd service to avoid crash loop
    rm -f /etc/rc.d/*sysntpd
  releases:
  - snapshot
  - 24.10
  - 25.12
  types:
    - container

mappings:
  architecture_map: openwrt
